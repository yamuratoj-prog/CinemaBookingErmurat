<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель - CineErmurat</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🎬 CineErmurat - Админ</div>
        <ul class="nav-links">
            <li><a href="/">Главная</a></li>
            <li><a href="/logout">Выйти</a></li>
        </ul>
    </nav>

    <section class="section">
        <div class="container">
            <h2>Админ панель</h2>
            <div class="admin-tabs">
                <button class="tab-btn active" onclick="showTab('cinemas')">Кинотеатры</button>
                <button class="tab-btn" onclick="showTab('movies')">Фильмы</button>
                <button class="tab-btn" onclick="showTab('viewers')">Зрители</button>
                <button class="tab-btn" onclick="showTab('tickets')">Билеты</button>
            </div>

            <div id="cinemas-tab" class="tab-content">
                <h3>Управление кинотеатрами</h3>
                <button class="btn btn-primary" onclick="showAddForm('cinema')">Добавить кинотеатр</button>
                <div id="cinemas-list"></div>
            </div>

            <div id="movies-tab" class="tab-content" style="display: none;">
                <h3>Управление фильмами</h3>
                <button class="btn btn-primary" onclick="showAddForm('movie')">Добавить фильм</button>
                <div id="movies-list"></div>
            </div>

            <div id="viewers-tab" class="tab-content" style="display: none;">
                <h3>Управление зрителями</h3>
                <button class="btn btn-primary" onclick="showAddForm('viewer')">Добавить зрителя</button>
                <div id="viewers-list"></div>
            </div>

            <div id="tickets-tab" class="tab-content" style="display: none;">
                <h3>Управление билетами</h3>
                <div id="tickets-list"></div>
            </div>
        </div>
    </section>

    <div id="add-form" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3 id="form-title">Добавить</h3>
            <form id="entity-form">
                <!-- Форма будет динамически заполняться -->
            </form>
        </div>
    </div>

    <script>
        let currentTab = 'cinemas';
        let currentEntity = '';

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-tab').style.display = 'block';
            document.querySelector(`[onclick="showTab('${tab}')"]`).classList.add('active');
            currentTab = tab;
            loadData(tab);
        }

        async function loadData(entity) {
            try {
                const response = await fetch(`/admin/api/${entity}`);
                const data = await response.json();
                displayList(entity, data);
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
            }
        }

        function displayList(entity, data) {
            const listEl = document.getElementById(entity + '-list');
            listEl.innerHTML = '';
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'admin-item';
                div.innerHTML = `
                    <div class="item-info">${JSON.stringify(item, null, 2)}</div>
                    <div class="item-actions">
                        <button onclick="editItem('${entity}', ${item.id})">Редактировать</button>
                        <button onclick="deleteItem('${entity}', ${item.id})">Удалить</button>
                    </div>
                `;
                listEl.appendChild(div);
            });
        }

        function showAddForm(entity) {
            currentEntity = entity;
            document.getElementById('form-title').textContent = 'Добавить ' + entity;
            document.getElementById('entity-form').innerHTML = getFormFields(entity);
            document.getElementById('add-form').style.display = 'block';
        }

        function getFormFields(entity) {
            const fields = {
                cinema: `
                    <input type="text" name="name" placeholder="Название" required>
                    <input type="text" name="address" placeholder="Адрес" required>
                    <input type="text" name="city" placeholder="Город" required>
                    <input type="text" name="phone" placeholder="Телефон" required>
                    <input type="number" name="totalSeats" placeholder="Всего мест" required>
                `,
                movie: `
                    <input type="text" name="title" placeholder="Название" required>
                    <input type="text" name="genre" placeholder="Жанр" required>
                    <input type="text" name="director" placeholder="Режиссёр" required>
                    <input type="number" name="durationMinutes" placeholder="Длительность (мин)" required>
                    <input type="number" step="0.01" name="price" placeholder="Цена" required>
                    <input type="text" name="showTime" placeholder="Время показа" required>
                    <input type="number" name="availableSeats" placeholder="Свободных мест" required>
                    <input type="number" name="cinemaId" placeholder="ID кинотеатра" required>
                `,
                viewer: `
                    <input type="text" name="firstName" placeholder="Имя" required>
                    <input type="text" name="lastName" placeholder="Фамилия" required>
                    <input type="email" name="email" placeholder="Email" required>
                    <input type="text" name="phone" placeholder="Телефон" required>
                    <input type="number" name="age" placeholder="Возраст" required>
                `
            };
            return fields[entity] + '<button type="submit" class="btn btn-primary">Сохранить</button>';
        }

        document.getElementById('entity-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            try {
                const response = await fetch(`/admin/api/${currentEntity}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    closeModal();
                    loadData(currentTab);
                } else {
                    alert('Ошибка сохранения');
                }
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        });

        async function deleteItem(entity, id) {
            if (confirm('Удалить?')) {
                try {
                    const response = await fetch(`/admin/api/${entity}/${id}`, { method: 'DELETE' });
                    if (response.ok) {
                        loadData(currentTab);
                    } else {
                        alert('Ошибка удаления');
                    }
                } catch (error) {
                    alert('Ошибка: ' + error.message);
                }
            }
        }

        function editItem(entity, id) {
            // Для простоты, можно реализовать редактирование аналогично добавлению
            alert('Редактирование не реализовано в этом примере');
        }

        function closeModal() {
            document.getElementById('add-form').style.display = 'none';
        }

        // Загрузка начальных данных
        showTab('cinemas');
    </script>
</body>
</html>
